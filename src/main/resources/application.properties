# these are coming from environment variables, which are set by config map in kubernetes.

spring.main.allow-circular-references=true

springdoc.api-docs.version=openapi_3_1
springdoc.swagger-ui.supportedSubmitMethods=""
springdoc.swagger-ui.configUrl=/auth/api-docs/swagger-config
springdoc.swagger-ui.url=/auth/api-docs
springdoc.api-docs.path=/api-docs

